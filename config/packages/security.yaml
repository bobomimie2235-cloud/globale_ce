security:
    # Password hashers
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'argon2id'

    # User provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_accueil
                always_use_default_target_path: true
                enable_csrf: true

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800        # 7 jours (en secondes)
                path: /
                always_remember_me: false
            
            logout:
                path: app_logout
                target: app_accueil

    role_hierarchy:
        ROLE_ADMIN: ROLE_USER   # ← un admin a automatiquement les droits user


    access_control:
        # 🔓 Pages publiques
        - { path: ^/accueil, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/mot-de-passe-oublie, roles: PUBLIC_ACCESS }
        - { path: ^/reinitialiser-mot-de-passe, roles: PUBLIC_ACCESS }
        - { path: ^/mentions-legales, roles: PUBLIC_ACCESS }
        - { path: ^/politique-de-confidentialite, roles: PUBLIC_ACCESS }
        - { path: ^/cgv, roles: PUBLIC_ACCESS }
        - { path: ^/contactez-nous, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS }

        # 👑 ADMIN uniquement
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/utilisateur-groupe, roles: ROLE_ADMIN }
        - { path: ^/utilisateur/new, roles: ROLE_ADMIN }
        - { path: ^/utilisateur/\d+/edit, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/utilisateur/\d+$, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/utilisateur, roles: ROLE_ADMIN }
        - { path: ^/article-categorie, roles: ROLE_ADMIN }
        - { path: ^/produit-categorie, roles: ROLE_ADMIN }

        # 🔐 Utilisateurs connectés
        - { path: ^/commande, roles: ROLE_USER }
        - { path: ^/article, roles: ROLE_USER }
        - { path: ^/produit, roles: ROLE_USER }
        - { path: ^/coupon, roles: ROLE_USER }
        - { path: ^/profil, roles: ROLE_USER }

        # 🔒 Tout le reste nécessite une connexion
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10