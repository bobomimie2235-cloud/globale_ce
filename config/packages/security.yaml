security:
    # Password hashers
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'argon2id'

    # User provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800        # 7 jours (en secondes)
                path: /
                always_remember_me: false
            
            logout:
                path: app_logout
                target: app_accueil

    access_control:
        # Exemple de restriction de route
        # - { path: ^/admin, roles: ROLE_ADMIN }
        # - { path: ^/profile, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10